<!-- layout.html - Base template with shared navigation, language selector, and page structure -->
<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">
        {% block title %}<title>{{ t.get('library_catalog', 'Library Catalog') }}</title>{% endblock %}
        <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
    </head>
    <body>
        <header class="site-header">
            <h1>{{ t.get('library_catalog', 'Library Catalog') }}</h1>
            <div>
                <a href="/set-language/en"><button>🇺🇸 EN</button></a>
                <a href="/set-language/fr"><button>🇫🇷 FR</button></a>
                <a href="/set-language/ht"><button>🇭🇹 HT</button></a>
            </div>
        </header>

        {% block content %}{% endblock %}
    </body>
</html>
